name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: krysta-probe-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: krysta-probe-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: krysta-probe-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: krysta-probe-macos-arm64

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp krysta-probe/target/${{ matrix.target }}/release/krysta-probe.exe ${{ matrix.binary }}
          else
            cp krysta-probe/target/${{ matrix.target }}/release/krysta-probe ${{ matrix.binary }}
          fi
      
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.binary }}